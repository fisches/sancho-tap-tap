<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f3ea" />
    <title>Sancho Tap Tap</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="playground theme-sky" id="playground" aria-label="Zone de jeu tactile">
      <div class="background-layer">
        <div class="shape shape-a"></div>
        <div class="shape shape-b"></div>
        <div class="shape shape-c"></div>
        <div class="shape shape-d"></div>
        <div class="pattern"></div>
      </div>

      <div class="hud">
        <div id="gamepadStatus" class="gamepad-status" aria-live="polite">manette inactive</div>
        <button id="menuButton" class="menu-button" type="button" aria-label="Retour au menu">
          menu
        </button>
        <button id="fullscreenButton" class="fullscreen-button" type="button" aria-label="Plein ecran">
          plein ecran
        </button>
      </div>

      <section class="menu-screen" id="menuScreen" aria-label="Menu de demarrage">
        <div class="menu-card">
          <h1 class="menu-title">sancho tap tap</h1>
          <p class="menu-pitch">
            Un petit jeu tout simple. On tape, on appuie, et des emojis
            rigolos apparaissent partout avec de jolies animations.
          </p>

          <div class="menu-groups">
            <section class="option-group" aria-labelledby="timerTitle">
              <p class="option-title" id="timerTitle">minuteur</p>
              <div class="option-row option-row-timer" id="timerOptions">
                <button class="option-button" type="button" data-group="timer" data-value="5">
                  5 min
                </button>
                <button class="option-button is-active" type="button" data-group="timer" data-value="10">
                  10 min
                </button>
                <button class="option-button" type="button" data-group="timer" data-value="15">
                  15 min
                </button>
                <button class="option-button" type="button" data-group="timer" data-value="off">
                  infini
                </button>
              </div>
            </section>

            <section class="option-group" aria-labelledby="emojiTitle">
              <p class="option-title" id="emojiTitle">emojis</p>
              <div class="option-row" id="emojiOptions">
                <button class="option-button" type="button" data-group="emoji" data-value="animals">
                  animaux
                </button>
                <button class="option-button" type="button" data-group="emoji" data-value="princess">
                  princesse
                </button>
                <button class="option-button" type="button" data-group="emoji" data-value="adventure">
                  aventure
                </button>
              </div>
              <div class="option-row option-row-featured">
                <button class="option-button option-button-featured is-active" type="button" data-group="emoji" data-value="all">
                  tous
                </button>
              </div>
            </section>
          </div>

          <button id="playButton" class="play-button" type="button">jouer</button>
        </div>
      </section>

      <div class="session-timer" id="sessionTimer" aria-hidden="true"></div>
      <div class="ending-screen" id="endingScreen" aria-hidden="true">
        <div class="ending-card">
          <p class="ending-title">petite pause</p>
          <p class="ending-text">la partie se termine tranquillement</p>
        </div>
      </div>
      <div class="hint" id="hint" aria-hidden="true">sancho tap tap</div>
      <div class="gamepad-cursor" id="gamepadCursor" aria-hidden="true"></div>
      <div class="emoji-stage" id="emojiStage" aria-hidden="true"></div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
